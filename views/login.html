<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure Login — SecureAuth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/auth.css" />
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-gradient-orb orb-1"></div>
  <div class="bg-gradient-orb orb-2"></div>

  <div class="page-center">
    <div class="auth-card" id="loginCard">
      <!-- Lock icon -->
      <div class="card-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>

      <div class="card-header">
        <h1 class="card-title">Welcome back</h1>
        <p class="card-subtitle">Sign in to your secure account</p>
      </div>

      <div id="alertBox" class="alert hidden"></div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="identifier">Username or Email</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <input class="form-input" type="text" id="identifier" name="identifier" autocomplete="username" placeholder="Enter your username or email" required />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">
            Password
            <a href="#" class="forgot-link">Forgot password?</a>
          </label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input class="form-input" type="password" id="password" name="password" autocomplete="current-password" placeholder="Enter your password" required />
            <button type="button" class="toggle-password" onclick="togglePassword('password', this)" aria-label="Toggle password visibility">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-primary" id="loginBtn">
          <span class="btn-text">Sign In</span>
          <span class="btn-spinner hidden"></span>
        </button>
      </form>

      <div class="card-footer">
        <p>Don't have an account? <a href="/register" class="link">Create account</a></p>
      </div>

      <div class="security-badge">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        256-bit encrypted · bcrypt hashed · Rate limited
      </div>
    </div>

    <!-- 2FA Card -->
    <div class="auth-card hidden" id="twoFACard">
      <div class="card-icon tfa-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/>
        </svg>
      </div>
      <div class="card-header">
        <h1 class="card-title">Two-Factor Auth</h1>
        <p class="card-subtitle">Enter the 6-digit code from your authenticator app</p>
      </div>

      <div id="tfa-alertBox" class="alert hidden"></div>

      <form id="twoFAForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="token">Authentication Code</label>
          <input class="form-input otp-input" type="text" id="token" name="token"
            inputmode="numeric" pattern="\d{6}" maxlength="6" autocomplete="one-time-code"
            placeholder="000000" required />
        </div>
        <button type="submit" class="btn-primary" id="tfaBtn">
          <span class="btn-text">Verify Code</span>
          <span class="btn-spinner hidden"></span>
        </button>
      </form>
      <div class="card-footer">
        <p><a href="#" onclick="backToLogin()" class="link">← Back to login</a></p>
      </div>
    </div>
  </div>

  <footer class="creator-footer">
    <div class="creator-text">
      <span class="created-label">Created by</span>
      <span class="creator-name">
        <span class="letter">V</span><span class="letter">i</span><span class="letter">s</span><span class="letter">h</span><span class="letter">a</span><span class="letter">l</span><span class="space">&nbsp;</span><span class="letter">J</span><span class="letter">a</span><span class="letter">n</span><span class="letter">g</span><span class="letter">i</span><span class="letter">d</span>
      </span>
      <span class="creator-pulse"></span>
    </div>
  </footer>

  <script src="/js/auth.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const identifier = document.getElementById('identifier').value;
      const password = document.getElementById('password').value;

      setLoading(btn, true);
      clearAlert('alertBox');

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ identifier, password }),
        });
        const data = await res.json();

        if (data.success && data.requires2FA) {
          document.getElementById('loginCard').classList.add('hidden');
          document.getElementById('twoFACard').classList.remove('hidden');
          document.getElementById('token').focus();
        } else if (data.success) {
          showAlert('alertBox', 'Login successful! Redirecting...', 'success');
          setTimeout(() => window.location.href = data.redirect, 800);
        } else {
          showAlert('alertBox', data.errors.join('<br>'), 'error');
          setLoading(btn, false);
        }
      } catch {
        showAlert('alertBox', 'Network error. Please try again.', 'error');
        setLoading(btn, false);
      }
    });

    document.getElementById('twoFAForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('tfaBtn');
      const token = document.getElementById('token').value;

      setLoading(btn, true);
      clearAlert('tfa-alertBox');

      try {
        const res = await fetch('/api/verify-2fa', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token }),
        });
        const data = await res.json();

        if (data.success) {
          showAlert('tfa-alertBox', 'Verified! Redirecting...', 'success');
          setTimeout(() => window.location.href = data.redirect, 800);
        } else {
          showAlert('tfa-alertBox', data.errors.join('<br>'), 'error');
          setLoading(btn, false);
        }
      } catch {
        showAlert('tfa-alertBox', 'Network error. Please try again.', 'error');
        setLoading(btn, false);
      }
    });

    // Format OTP input
    document.getElementById('token').addEventListener('input', (e) => {
      e.target.value = e.target.value.replace(/\D/g, '').slice(0, 6);
    });

    function backToLogin() {
      document.getElementById('twoFACard').classList.add('hidden');
      document.getElementById('loginCard').classList.remove('hidden');
    }
  </script>
</body>
</html>
