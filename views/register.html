<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — SecureAuth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/auth.css" />
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-gradient-orb orb-1"></div>
  <div class="bg-gradient-orb orb-2"></div>

  <div class="page-center">
    <div class="auth-card">
      <div class="card-icon reg-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
          <line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/>
        </svg>
      </div>

      <div class="card-header">
        <h1 class="card-title">Create account</h1>
        <p class="card-subtitle">Join with a secure, hashed account</p>
      </div>

      <div id="alertBox" class="alert hidden"></div>

      <form id="registerForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <input class="form-input" type="text" id="username" name="username"
              autocomplete="username" placeholder="3–30 chars, letters/numbers/_" required />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
              </svg>
            </span>
            <input class="form-input" type="email" id="email" name="email"
              autocomplete="email" placeholder="you@example.com" required />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input class="form-input" type="password" id="password" name="password"
              autocomplete="new-password" placeholder="Min 8 chars, upper/lower/number/symbol" required />
            <button type="button" class="toggle-password" onclick="togglePassword('password', this)" aria-label="Toggle visibility">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="password-strength" id="strengthBar">
            <div class="strength-fill" id="strengthFill"></div>
          </div>
          <div class="strength-label" id="strengthLabel"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm Password</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
            </span>
            <input class="form-input" type="password" id="confirmPassword" name="confirmPassword"
              autocomplete="new-password" placeholder="Re-enter your password" required />
            <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword', this)" aria-label="Toggle visibility">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-primary" id="registerBtn">
          <span class="btn-text">Create Account</span>
          <span class="btn-spinner hidden"></span>
        </button>
      </form>

      <div class="card-footer">
        <p>Already have an account? <a href="/login" class="link">Sign in</a></p>
      </div>

      <div class="security-badge">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        Passwords hashed with bcrypt · Never stored in plain text
      </div>
    </div>
  </div>

  <footer class="creator-footer">
    <div class="creator-text">
      <span class="created-label">Created by</span>
      <span class="creator-name">
        <span class="letter">V</span><span class="letter">i</span><span class="letter">s</span><span class="letter">h</span><span class="letter">a</span><span class="letter">l</span><span class="space">&nbsp;</span><span class="letter">J</span><span class="letter">a</span><span class="letter">n</span><span class="letter">g</span><span class="letter">i</span><span class="letter">d</span>
      </span>
      <span class="creator-pulse"></span>
    </div>
  </footer>

  <script src="/js/auth.js"></script>
  <script>
    // Password strength meter
    document.getElementById('password').addEventListener('input', function () {
      const val = this.value;
      const fill = document.getElementById('strengthFill');
      const label = document.getElementById('strengthLabel');
      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[a-z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;

      const levels = ['', 'Very Weak', 'Weak', 'Fair', 'Strong', 'Very Strong'];
      const colors = ['', '#ef4444', '#f97316', '#eab308', '#22c55e', '#16a34a'];
      fill.style.width = (score * 20) + '%';
      fill.style.background = colors[score] || '#e5e7eb';
      label.textContent = val.length ? levels[score] : '';
      label.style.color = colors[score];
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('registerBtn');
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password !== confirmPassword) {
        showAlert('alertBox', 'Passwords do not match.', 'error');
        return;
      }

      setLoading(btn, true);
      clearAlert('alertBox');

      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            email: document.getElementById('email').value,
            password,
            confirmPassword,
          }),
        });
        const data = await res.json();

        if (data.success) {
          showAlert('alertBox', data.message + ' Redirecting...', 'success');
          setTimeout(() => window.location.href = '/login', 1500);
        } else {
          showAlert('alertBox', data.errors.join('<br>'), 'error');
          setLoading(btn, false);
        }
      } catch {
        showAlert('alertBox', 'Network error. Please try again.', 'error');
        setLoading(btn, false);
      }
    });
  </script>
</body>
</html>
